<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: "class" };</script>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <main class="mx-auto grid min-h-screen max-w-4xl place-items-center px-4 py-8 fade-in">
        <section class="slide-up w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div class="mb-4 flex items-center gap-3">
                <div class="grid h-11 w-11 place-items-center rounded-xl bg-emerald-600 text-white"><i class="fa-solid fa-user"></i></div>
                <div>
                    <h1 class="text-2xl font-semibold leading-tight">Create Account</h1>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Register as voter or admin</p>
                </div>
            </div>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">Register voter/admin using secure form input.</p>
            <form id="signupForm" class="mt-5 grid gap-4 md:grid-cols-2">
                <label class="text-sm">Name<input class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="name" required /></label>
                <label class="text-sm">Age<input class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="age" type="number" min="18" required /></label>
                <label class="text-sm">Email<input class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="email" type="email" /></label>
                <label class="text-sm">Mobile<input class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="mobile" required /></label>
                <label class="text-sm md:col-span-2">Address<input class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="address" required /></label>
                <label class="text-sm">Aadhar Number<input class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="adhar" required /></label>
                <label class="text-sm">Password<input class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="password" type="password" minlength="6" required /></label>
                <label class="text-sm">Role
                    <select class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="role">
                        <option value="voter">Voter</option>
                        <option value="admin">Admin</option>
                    </select>
                </label>
                <label class="text-sm">Already Voted
                    <select class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" id="isVoted">
                        <option value="false">No</option>
                        <option value="true">Yes</option>
                    </select>
                </label>
            </form>
            <button id="signupBtn" class="mt-4 btn btn-primary"><i class="fa-solid fa-user-check me-1"></i>Create Account</button>
            <button id="gotoLoginBtn" class="mt-2 btn btn-outline-secondary"><i class="fa-solid fa-arrow-left me-1"></i>Back to Login</button>
            <pre id="result" class="result mt-4 rounded-xl bg-slate-900 p-4 text-emerald-200">Ready.</pre>
        </section>
    </main>
    <div id="globalLoader" class="hidden">
        <div class="loader-card"><div class="spinner"></div><span>Processing...</span></div>
    </div>
    <script type="module" src="./signup.js"></script>
</body>
</html>
