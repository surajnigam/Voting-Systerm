<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: "class" };</script>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <main class="mx-auto grid min-h-screen max-w-xl place-items-center px-4 py-8 fade-in">
        <section class="slide-up w-full rounded-2xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
            <div class="mb-4 flex items-center gap-3">
                <div class="grid h-11 w-11 place-items-center rounded-xl bg-indigo-600 text-white"><i class="fa-solid fa-lock"></i></div>
                <div>
                    <h1 class="text-2xl font-semibold leading-tight">Sign In</h1>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Voting Portal Access</p>
                </div>
            </div>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">Use Aadhaar number and password to start secure session.</p>
            <label class="mt-4 block text-sm">Aadhar Number
                <input id="adhar" class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" />
            </label>
            <label class="mt-3 block text-sm">Password
                <input id="password" type="password" class="mt-1 w-full rounded-lg border border-slate-300 p-2 dark:border-slate-700 dark:bg-slate-950" />
            </label>
            <div class="mt-4 flex gap-2">
                <button id="loginBtn" class="mt-2 btn btn-primary"><i class="fa-solid fa-right-to-bracket me-1"></i>Login</button>
                <button id="gotoSignupBtn" class="mt-2 btn btn-outline-secondary"><i class="fa-solid fa-user-plus me-1"></i>Create Account</button>
            </div>
          
            <!-- <pre id="result" class="result mt-4 rounded-xl bg-slate-900 p-4 text-emerald-200">Ready.</pre> -->
        </section>
    </main>
    <div id="globalLoader" class="hidden">
        <div class="loader-card"><div class="spinner"></div><span>Processing...</span></div>
    </div>
    <script type="module" src="./login.js"></script>
</body>
</html>
