<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voting App</title>
    <link rel="icon" href="./file/S.svg" type="/image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: "class" };</script>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body class="app-body bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <header class="app-main-header sticky top-0 z-40 border-b border-slate-200 bg-white/85 glass dark:border-slate-800 dark:bg-slate-900/80">
        <div class="app-header-row mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
            <div class="app-brand-center grid h-9 w-9 place-items-center rounded-xl bg-indigo-600 text-white shadow-md"><img src="./file/S.svg" alt="Logo" height="22" width="22"></div>
            <div id="topMenu" class="app-menu-wrap">
                <div class="app-nav flex flex-wrap items-center gap-2 text-sm">
                    <button class="nav-btn btn btn-primary btn-sm" data-page="home"><i class="fa-solid fa-house me-1"></i>Home</button>
                    <button class="nav-btn admin-only btn btn-outline-secondary btn-sm" data-page="admin"><i class="fa-solid fa-user-shield me-1"></i>Admin</button>
                    <button class="nav-btn btn btn-outline-secondary btn-sm" data-page="voting"><i class="fa-solid fa-check-to-slot me-1"></i>Voting</button>
                    <button class="nav-btn btn btn-outline-secondary btn-sm" data-page="results"><i class="fa-solid fa-chart-column me-1"></i>Results</button>
                </div>
            </div>
            <div class="app-right-group d-flex align-items-center gap-2">
                <section class="d-flex gap-1">
                    <label for="headerActionSelect" class="visually-hidden">Role and actions</label>
                    <select id="headerActionSelect" class="form-select form-select-sm app-action-select">
                        <option value="role" selected></option>
                        <option value="theme">Toggle Theme</option>
                        <option value="logout">Logout</option>
                    </select>
                    <button id="menuToggle" class="btn btn-outline-secondary btn-sm d-lg-none" aria-label="Toggle menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </section>

               
            </div>
        </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-8 fade-in">
        <div id="pageMount"></div>
    </main>

    <div id="globalLoader" class="hidden">
        <div class="loader-card">
            <div class="spinner"></div>
            <span>Processing...</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./index.js"></script>
</body>
</html>
